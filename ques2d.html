<!DOCTYPE html>
<html>
<head>
  <title>Three Column Layout</title>
  <style>
    .container {
      display: flex;
      height: 100vh;
    }
    .section {
      flex: 1;
      border: 2px solid blue;
      padding: 15px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Section 1 : Image -->
  <div class="section">
    <h3>My Image</h3>
    <img src="C:\Users\Hemcharan\OneDrive\Pictures\deadpool.jpg" width="400" height="300" alt="#Avengers">
  </div>

  <!-- Section 2 : Description -->
  <div class="section">
    <h3>About Me</h3>
    <p>
      I am a student of Cyber security.  
      This page is designed using Flexbox instead of frames.
    </p>
  </div>

  <!-- Section 3 : Hyperlink -->
  <div class="section">
    <h3>Useful Link</h3>
    <a href="https://www.youtube.com/" target="_blank">
      Visit YouTube
    </a>
  </div>

</div>

</body>
</html>
